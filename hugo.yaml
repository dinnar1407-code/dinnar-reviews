baseURL: "https://dinnar.us.com/"
theme: "PaperMod"
enableRobotsTXT: true
publishDir: docs
defaultContentLanguage: en

languages:
  en:
    label: "English"
    weight: 1
    title: "Best Tools Review 2026"
    params:
      description: "Honest, tested reviews of SaaS, hosting & prediction market platforms."
      homeInfoParams:
        Title: "Best Tools Review 2026"
        Content: >
          Honest, tested reviews of SaaS tools, hosting providers, and prediction market platforms.
          Everything you need to grow online — reviewed by someone who actually uses them.

  zh:
    label: "简体中文"
    locale: zh-CN
    weight: 2
    title: "最佳工具测评 2026"
    params:
      description: "SaaS、主机、预测市场平台的真实测评"
      homeInfoParams:
        Title: "最佳工具测评 2026"
        Content: >
          SaaS工具、主机服务、预测市场平台的诚实测评。亲身测试，不是纸上谈兵。

  zht:
    label: "繁體中文"
    locale: zh-TW
    weight: 3
    title: "最佳工具評測 2026"
    params:
      description: "SaaS、主機、預測市場平台的真實評測"
      homeInfoParams:
        Title: "最佳工具評測 2026"
        Content: >
          SaaS工具、主機服務、預測市場平台的誠實評測。親身測試，不是紙上談兵。

params:
  env: production
  author: "Dinnar Reviews"
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  ShowToc: true
  TocOpen: false
  ShowLanguageSwitcher: true
  socialIcons:
    - name: "rss"
      url: "/index.xml"
  googleAnalytics: "UA-XXXXXXXXX-X"
  assets:
    favicon: ""
    favicon16x16: ""
    favicon32x32: ""
    apple_touch_icon: ""
    safari_pinned_tab: ""

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 1
    - name: "Posts"
      url: "/posts/"
      weight: 2
    - name: "About"
      url: "/about/"
      weight: 3

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  category: categories
  tag: tags
